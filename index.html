<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#15171c" />
<title>League Cup</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  /* ============================================================
     LEAGUE CUP — leaderboard & schedule dashboard (display-only)
     Two sections; within each, Performance + Recreational are shown
     SIDE BY SIDE, colour-coded and sectioned off (no league tab).
     Reads published Standings CSVs from the Google Sheets.
     Fixtures + sports computed client-side (identical every league).
     Responsive: phone-friendly, optimised for laptop screens.
     ============================================================ */
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --ink: #15171c;
    --ink-soft: #3a3f4a;
    --ink-mute: #757c89;
    --dark: #15171c;
    --accent: #2d6cdf;
    --line: #e4e7ec;
    --line-strong: #d4c0b3;
    --shadow: 0 1px 2px rgba(20,23,28,0.05), 0 6px 18px rgba(20,23,28,0.05);
    --shadow-lift: 0 4px 10px rgba(20,23,28,0.08), 0 18px 40px rgba(20,23,28,0.10);

    /* Team palette — the dominant visual identity */
    --t-red:    #d6342b;
    --t-yellow: #e0a91f;
    --t-green:  #2f9e54;
    --t-blue:   #2f6fd4;
    --t-maroon: #8a3b53;

    /* League panel tints — distinct from every team colour */
    --lg-perf-bg:   #f2edfb;
    --lg-perf-line: #e0d4f5;
    --lg-perf-ink:  #6d28d9;
    --lg-rec-bg:    #e7f5f2;
    --lg-rec-line:  #c7e8e1;
    --lg-rec-ink:   #0e7c6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.45; font-size: 16px;
    overflow-x: hidden; -webkit-tap-highlight-color: transparent;
    padding-bottom: env(safe-area-inset-bottom);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  .wrap { max-width: 640px; margin: 0 auto; min-height: 100vh; }

  /* ----- Header ----- */
  header {
    position: sticky; top: 0; z-index: 30; background: var(--dark); color: #fff;
    padding: calc(18px + env(safe-area-inset-top)) 18px 16px;
    box-shadow: 0 2px 16px rgba(20,23,28,0.18);
  }
  .header-inner { max-width: 1120px; margin: 0 auto; text-align: center; }
  header h1 {
    font-weight: 800; font-size: clamp(26px, 8vw, 36px); line-height: 1;
    letter-spacing: -0.02em; display: flex; align-items: baseline; justify-content: center; gap: 10px;
  }
  header h1 .cup { color: #ffd24a; }
  header .sub-tag { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 5px; letter-spacing: 0.02em; }

  .switchers { display: flex; gap: 22px; flex-wrap: wrap; justify-content: center; margin-top: 16px; }
  .switch-group { flex: 1; min-width: 200px; max-width: 460px; margin: 0 auto; }
  .switch-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.45); margin-bottom: 7px;
  }
  .seg { display: flex; gap: 8px; }
  .seg button {
    flex: 1; padding: 11px 8px; border-radius: 11px;
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
    font-weight: 700; font-size: 14px; transition: all 0.16s ease; white-space: nowrap;
  }
  .seg button:hover { background: rgba(255,255,255,0.16); color: #fff; }
  .seg button.active { background: #fff; color: var(--ink); box-shadow: 0 4px 14px rgba(0,0,0,0.25); }
  .seg button.active:hover { background: #fff; }

  /* ----- View tabs ----- */
  .view-tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 20; }
  .view-tabs-inner { display: flex; width: 100%; max-width: 1120px; margin: 0 auto; }
  .view-tabs button {
    flex: 1; padding: 15px 8px; font-weight: 700; font-size: 15px;
    color: var(--ink-mute); position: relative; transition: color 0.15s;
  }
  .view-tabs button:hover { color: var(--ink-soft); }
  .view-tabs button.active { color: var(--ink); }
  .view-tabs button.active::after {
    content: ''; position: absolute; left: 18%; right: 18%; bottom: 0;
    height: 3px; background: var(--accent); border-radius: 3px 3px 0 0;
  }

  main { padding: 18px 16px 40px; max-width: 1120px; margin: 0 auto; }

  .sub { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
  .sub h2 { font-size: 21px; font-weight: 800; letter-spacing: -0.01em; }
  .sub h2 .dim { color: var(--ink-mute); font-weight: 700; }
  .refresh {
    display: inline-flex; align-items: center; gap: 6px; background: var(--dark); color: #fff;
    font-weight: 700; font-size: 13px; padding: 9px 14px; border-radius: 999px; box-shadow: var(--shadow);
    transition: transform 0.12s ease, opacity 0.12s ease;
  }
  .refresh:hover { opacity: 0.9; }
  .refresh:active { transform: scale(0.96); }
  .refresh.spin svg { animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ----- League columns (both leagues shown together, colour-coded) ----- */
  .leagues { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .league-col { border-radius: 18px; padding: 14px; border: 1px solid var(--line); background: var(--panel); }
  .league-col.perf { background: var(--lg-perf-bg); border-color: var(--lg-perf-line); }
  .league-col.rec  { background: var(--lg-rec-bg);  border-color: var(--lg-rec-line); }
  .league-head {
    display: inline-flex; align-items: center; gap: 8px; margin: 2px 2px 12px;
    padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .league-col.perf .league-head { background: rgba(109,40,217,0.13); color: var(--lg-perf-ink); }
  .league-col.rec  .league-head { background: rgba(14,124,110,0.13); color: var(--lg-rec-ink); }

  /* ----- Leaderboard ----- */
  .board { display: flex; flex-direction: column; gap: 12px; }
  .row {
    display: grid; grid-template-columns: 52px 1fr auto; align-items: center; gap: 14px;
    background: var(--panel); border-radius: 16px; padding: 16px 18px;
    box-shadow: var(--shadow); border-left: 10px solid var(--team); overflow: hidden;
    transition: transform 0.14s ease, box-shadow 0.14s ease;
  }
  .row:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); }
  .row.lead { box-shadow: var(--shadow-lift); }
  .row .rank { font-weight: 800; font-size: 34px; color: var(--team); line-height: 1; text-align: center; }
  .row.lead .rank::after { content: '🏆'; display: block; font-size: 14px; margin-top: 3px; }
  .row .who { min-width: 0; }
  .row .team { font-weight: 800; font-size: 20px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 9px; }
  .row .dot { width: 15px; height: 15px; border-radius: 50%; background: var(--team); flex: none; box-shadow: 0 0 0 2px #fff, 0 0 0 3px var(--team); }
  .row .played { font-size: 13px; color: var(--ink-mute); margin-top: 3px; }
  .row .pts { text-align: right; }
  .row .pts .n { font-weight: 800; font-size: 32px; line-height: 1; }
  .row .pts .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); }

  /* ----- Schedule / fixtures ----- */
  .lesson-pick { display: flex; gap: 7px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .lesson-pick button {
    flex: none; width: 56px; padding: 9px 0; border-radius: 12px;
    background: var(--panel); border: 1.5px solid var(--line); box-shadow: var(--shadow);
    font-weight: 700; color: var(--ink-mute); text-align: center; line-height: 1.15;
    transition: transform 0.12s ease, border-color 0.12s ease;
  }
  .lesson-pick button:hover { transform: translateY(-2px); border-color: var(--line-strong); }
  .lesson-pick button .ln { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; display: block; }
  .lesson-pick button .nn { font-size: 22px; font-weight: 800; color: var(--ink); }
  .lesson-pick button.active { background: var(--dark); border-color: var(--dark); }
  .lesson-pick button.active .nn, .lesson-pick button.active .ln { color: #fff; }

  .sport-banner {
    background: var(--dark); color: #fff; border-radius: 16px; padding: 18px 20px; margin-bottom: 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px; box-shadow: var(--shadow-lift);
  }
  .sport-banner .lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.55); }
  .sport-banner .sport { font-weight: 800; font-size: 26px; margin-top: 3px; letter-spacing: -0.01em; }
  .sport-banner .loc { font-size: 13px; font-weight: 700; padding: 7px 14px; border-radius: 999px; background: rgba(255,255,255,0.12); white-space: nowrap; }
  .sport-banner .loc.out { background: rgba(47,158,84,0.30); }

  .rounds { display: flex; flex-direction: column; gap: 0; }
  .round-label { font-size: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); margin: 16px 2px 9px; }
  .round:first-child .round-label { margin-top: 0; }

  .game {
    background: var(--panel); border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow); margin-bottom: 10px;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .game:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); }
  .game .side { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .game .side.b { flex-direction: row-reverse; text-align: right; }
  .game .side .chip { width: 30px; height: 30px; border-radius: 9px; flex: none; background: var(--team); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.25); }
  .game .side .nm { font-weight: 800; font-size: 17px; }
  .game .vs { font-weight: 700; font-size: 13px; color: var(--ink-mute); }

  .ref-line { display: flex; align-items: center; gap: 8px; justify-content: center; margin: 2px 0 4px; font-size: 13px; color: var(--ink-soft); }
  .ref-line .ref-chip { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; }
  .ref-line .ref-chip .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--team); flex: none; }

  /* ----- States ----- */
  .state { text-align: center; padding: 48px 24px; color: var(--ink-mute); }
  .state.mini { padding: 30px 14px; }
  .state .big { font-size: 21px; font-weight: 800; color: var(--ink-soft); margin-bottom: 8px; }
  .state.mini .big { font-size: 17px; }
  .state .hint { font-size: 14px; line-height: 1.6; max-width: 520px; margin: 0 auto; }
  .state code { background: #eef0f3; padding: 2px 7px; border-radius: 6px; font-size: 12px; color: var(--accent); word-break: break-all; }
  .skeleton { background: linear-gradient(100deg, var(--panel) 30%, #eceef1 50%, var(--panel) 70%); background-size: 200% 100%; animation: sk 1.2s infinite; border-radius: 16px; height: 84px; margin-bottom: 12px; }
  @keyframes sk { to { background-position: -200% 0; } }
  .err-banner { background: #fdf0ee; border: 1px solid #f3c9c2; color: #9a3a2e; border-radius: 12px; padding: 12px 14px; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }

  footer { text-align: center; padding: 24px 16px 40px; color: var(--ink-mute); font-size: 12px; }
  footer .champs { font-weight: 700; color: var(--ink-soft); margin-top: 4px; }

  /* ============================================================
     DESKTOP / LAPTOP — the primary screen: leagues sit side by side
     ============================================================ */
  @media (min-width: 900px) {
    body { font-size: 17px; }
    .wrap { max-width: 1120px; }
    header { padding: 26px 40px 22px; }
    header h1 { font-size: 44px; }
    header .sub-tag { font-size: 14px; margin-top: 7px; }
    .switchers { margin-top: 18px; gap: 28px; }
    main { padding: 30px 40px 56px; }
    .sub h2 { font-size: 26px; }

    .leagues { grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
    .league-col { padding: 18px; }
    .league-head { font-size: 13px; }

    .board { gap: 12px; }
    .row { grid-template-columns: 58px 1fr auto; padding: 16px 20px; }
    .row .rank { font-size: 36px; }
    .row .team { font-size: 21px; }
    .row .pts .n { font-size: 34px; }

    .lesson-pick { justify-content: center; }
    .lesson-pick button { width: 76px; padding: 12px 0; }
    .lesson-pick button .nn { font-size: 26px; }
    .sport-banner { padding: 20px 22px; }
    .sport-banner .sport { font-size: 28px; }
    .round-label { font-size: 13px; }
    .game { padding: 16px 18px; }
    .game .side .chip { width: 34px; height: 34px; }
    .game .side .nm { font-size: 19px; }
    .ref-line { font-size: 14px; margin-top: 6px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-inner">
      <h1>League <span class="cup">Cup</span></h1>
      <div class="sub-tag">5 lessons · 5 sports · double round-robin</div>
      <div class="switchers">
        <div class="switch-group">
          <div class="switch-label">Section</div>
          <div class="seg" id="sectionToggle"><!-- built from SECTIONS --></div>
        </div>
      </div>
    </div>
  </header>

  <nav class="view-tabs">
    <div class="view-tabs-inner" id="viewTabs">
      <button data-view="board" class="active">Leaderboard</button>
      <button data-view="fixtures">Schedule</button>
    </div>
  </nav>

  <main id="main"><!-- rendered --></main>

  <footer>
    <div>Win 3 · Draw 1 · Loss 0 — points accumulate across all five lessons.</div>
    <div class="champs" id="champLine"></div>
  </footer>
</div>

<script>
/* ============================================================
   CONFIG — published Standings CSV, per section and league.
   Each value: Sheet → File → Share → Publish to web → the
   Standings tab → CSV. Rename the section keys ('9(8)'…)
   to your class names if you like — the buttons update to match.
   Leave a URL '' until that sheet is published; its leaderboard
   then shows a friendly "not connected yet" message.
   ============================================================ */
const SECTIONS = {
  '9(8)': {
    Performance:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vTvjn5PRi1N8uuw_iK0kI9x-77PoeF9EcO9jXEwJ6Crt8fGWElsfQ6o85yio3MEKm0vtdY5eUTBQ1w8/pub?gid=1192634599&single=true&output=csv',
    Recreational: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTvjn5PRi1N8uuw_iK0kI9x-77PoeF9EcO9jXEwJ6Crt8fGWElsfQ6o85yio3MEKm0vtdY5eUTBQ1w8/pub?gid=175904508&single=true&output=csv'
  },
  '9(7)': {
    Performance:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vROoAnYVLt6s8SOjwmBV7gEMz_H4XPLldTS8T55dobbYxILQVgwQDXvmljKGw48ZtxLFWED6r0JjcWI/pub?gid=378881660&single=true&output=csv',
    Recreational: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROoAnYVLt6s8SOjwmBV7gEMz_H4XPLldTS8T55dobbYxILQVgwQDXvmljKGw48ZtxLFWED6r0JjcWI/pub?gid=1299558990&single=true&output=csv'
  }
};

const LEAGUES = ['Performance', 'Recreational'];
const LEAGUE_CLASS = { Performance: 'perf', Recreational: 'rec' };

const TEAMS = ['Red', 'Yellow', 'Green', 'Blue', 'Maroon'];
const TEAM_COLOR = {
  Red: 'var(--t-red)', Yellow: 'var(--t-yellow)', Green: 'var(--t-green)',
  Blue: 'var(--t-blue)', Maroon: 'var(--t-maroon)'
};

/* ---- Sports per lesson per league (identical for both sections) ---- */
const SPORTS = {
  Performance: {
    1: { sport: 'Soccer',           loc: 'Out' },
    2: { sport: 'Basketball',       loc: 'In'  },
    3: { sport: 'Volleyball',       loc: 'In'  },
    4: { sport: 'Capture the Flag', loc: 'Out' },
    5: { sport: 'Benchball',        loc: 'In'  }
  },
  Recreational: {
    1: { sport: 'Benchball',        loc: 'In'  },
    2: { sport: 'Handball',         loc: 'Out' },
    3: { sport: 'Kickball',         loc: 'Out' },
    4: { sport: 'Volleyball',       loc: 'In'  },
    5: { sport: 'Capture the Flag', loc: 'Out' }
  }
};

/* ---- Master fixture pattern — identical for every 5-team league ---- */
const FIXTURES = {
  1: {
    1: { games: [['Red','Yellow'], ['Green','Blue']],   ref: 'Maroon' },
    2: { games: [['Red','Blue'],   ['Green','Maroon']], ref: 'Yellow' }
  },
  2: {
    1: { games: [['Yellow','Green'], ['Blue','Maroon']],  ref: 'Red'   },
    2: { games: [['Red','Blue'],     ['Yellow','Maroon']], ref: 'Green' }
  },
  3: {
    1: { games: [['Red','Maroon'], ['Green','Blue']],    ref: 'Yellow' },
    2: { games: [['Red','Green'],  ['Yellow','Maroon']], ref: 'Blue'   }
  },
  4: {
    1: { games: [['Red','Yellow'], ['Blue','Maroon']],   ref: 'Green'  },
    2: { games: [['Red','Green'],  ['Yellow','Blue']],   ref: 'Maroon' }
  },
  5: {
    1: { games: [['Red','Maroon'],  ['Yellow','Green']], ref: 'Blue'   },
    2: { games: [['Yellow','Blue'], ['Green','Maroon']], ref: 'Red'    }
  }
};

/* ============================================================ */
const SECTION_KEYS = Object.keys(SECTIONS);
const state = {
  section: SECTION_KEYS[0],
  view: 'board',
  lesson: 1,
  standings: {},   // key(section,league) -> array | null (not loaded)
  error: {},       // key(section,league) -> message
  loading: {}      // key(section,league) -> bool
};

const $main = document.getElementById('main');
const key = (section, league) => section + '||' + league;

/* ---- Build the Section switch from the config keys ---- */
(function buildSectionToggle() {
  const host = document.getElementById('sectionToggle');
  host.innerHTML = SECTION_KEYS.map((s, i) =>
    `<button data-section="${s}" class="${i === 0 ? 'active' : ''}">${s}</button>`
  ).join('');
})();

/* ---------- Toggles ---------- */
document.getElementById('sectionToggle').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  state.section = b.dataset.section;
  document.querySelectorAll('#sectionToggle button').forEach(x => x.classList.toggle('active', x === b));
  render();
  if (state.view === 'board') ensureLoaded();
});
document.getElementById('viewTabs').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  state.view = b.dataset.view;
  document.querySelectorAll('#viewTabs button').forEach(x => x.classList.toggle('active', x === b));
  render();
  if (state.view === 'board') ensureLoaded();
});

/* Load whichever league boards for the current section aren't loaded yet. */
function ensureLoaded() {
  if (state.view !== 'board') return;
  LEAGUES.forEach(league => {
    const k = key(state.section, league);
    if (state.standings[k] === undefined || state.standings[k] === null) {
      loadStandings(state.section, league);
    }
  });
}

function refreshSection() {
  LEAGUES.forEach(league => loadStandings(state.section, league));
}

/* ---------- Data ---------- */
function loadStandings(section, league) {
  const url = SECTIONS[section][league];
  const k = key(section, league);
  if (!url) { state.standings[k] = []; render(); return; }
  if (state.loading[k]) return;
  state.loading[k] = true;
  state.error[k] = null;
  setRefreshSpin(true);
  const bust = (url.includes('?') ? '&' : '?') + '_=' + Date.now();
  Papa.parse(url + bust, {
    download: true,
    complete: (res) => {
      state.loading[k] = false; setRefreshSpin(anyLoading());
      try { state.standings[k] = parseStandings(res.data); }
      catch (err) { state.standings[k] = []; state.error[k] = 'Could not read the standings sheet.'; }
      render();
    },
    error: () => {
      state.loading[k] = false; setRefreshSpin(anyLoading());
      state.standings[k] = [];
      state.error[k] = 'Could not reach the standings sheet. Check the published link and your connection.';
      render();
    }
  });
}

function anyLoading() { return Object.keys(state.loading).some(k => state.loading[k]); }

function num(v) { const n = parseFloat(String(v).replace(/[^0-9.\-]/g, '')); return isNaN(n) ? 0 : n; }

function parseStandings(rows) {
  const out = [];
  (rows || []).forEach(r => {
    if (!r || !r.length) return;
    const team = String(r[0]).trim();
    const canon = TEAMS.find(t => t.toLowerCase() === team.toLowerCase());
    if (!canon) return;
    out.push({
      team: canon, played: num(r[1]), points: num(r[2]),
      rank: r[3] != null && String(r[3]).trim() !== '' ? num(r[3]) : null
    });
  });
  out.sort((a, b) => b.points - a.points || a.team.localeCompare(b.team));
  return out;
}

/* ---------- Render ---------- */
function render() {
  if (state.view === 'board') renderBoard();
  else renderFixtures();
  renderChampLine();
}

function setRefreshSpin(on) { const r = document.querySelector('.refresh'); if (r) r.classList.toggle('spin', on); }

function refreshIcon() {
  return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0 0 20.5 15"/></svg>';
}

/* ----- Leaderboard: both leagues side by side ----- */
function renderBoard() {
  const sec = state.section;
  const head = `
    <div class="sub">
      <h2>Standings <span class="dim">· ${sec}</span></h2>
      <button class="refresh" onclick="refreshSection()">${refreshIcon()} Refresh</button>
    </div>`;
  const cols = LEAGUES.map(league => `
    <div class="league-col ${LEAGUE_CLASS[league]}">
      <div class="league-head">${league}</div>
      ${leagueBoardInner(sec, league)}
    </div>`).join('');
  $main.innerHTML = head + `<div class="leagues">${cols}</div>`;
}

/* Inner content of one league's board column (handles every state). */
function leagueBoardInner(section, league) {
  const k = key(section, league);

  if (!SECTIONS[section][league]) {
    return `
      <div class="state mini">
        <div class="big">Not connected yet</div>
        <div class="hint">
          Publish the <strong>Standings_${league}</strong> tab from ${section}'s sheet as CSV,
          then paste the link into <code>SECTIONS['${section}'].${league}</code>.
        </div>
      </div>`;
  }

  const data = state.standings[k];
  const err = state.error[k];

  if (data === undefined || data === null) {
    return '<div class="board">' + '<div class="skeleton"></div>'.repeat(5) + '</div>';
  }

  let out = '';
  if (err) out += `<div class="err-banner">${err}</div>`;

  if (!data.length) {
    out += `
      <div class="state mini">
        <div class="big">No results in yet</div>
        <div class="hint">Standings appear here once a teacher enters scores. Tap refresh.</div>
      </div>`;
    return out;
  }

  const leadPts = data[0].points;
  out += '<div class="board">';
  data.forEach((s, i) => {
    const isLead = s.points === leadPts && leadPts > 0;
    out += `
      <div class="row${isLead ? ' lead' : ''}" style="--team:${TEAM_COLOR[s.team]}">
        <div class="rank">${i + 1}</div>
        <div class="who">
          <div class="team"><span class="dot"></span>${s.team}</div>
          <div class="played">${s.played} game${s.played === 1 ? '' : 's'} played</div>
        </div>
        <div class="pts"><div class="n">${s.points}</div><div class="lbl">pts</div></div>
      </div>`;
  });
  out += '</div>';
  return out;
}

/* ----- Schedule: both leagues side by side (shared lesson + matchups) ----- */
function renderFixtures() {
  const L = state.lesson;
  const sec = state.section;

  let html = `<div class="sub"><h2>Schedule <span class="dim">· ${sec}</span></h2></div><div class="lesson-pick">`;
  for (let n = 1; n <= 5; n++) {
    html += `<button class="${n === L ? 'active' : ''}" onclick="pickLesson(${n})"><span class="ln">L</span><span class="nn">${n}</span></button>`;
  }
  html += `</div>`;

  const cols = LEAGUES.map(league => {
    const info = SPORTS[league][L];
    return `
    <div class="league-col ${LEAGUE_CLASS[league]}">
      <div class="league-head">${league}</div>
      <div class="sport-banner">
        <div>
          <div class="lbl">Lesson ${L}</div>
          <div class="sport">${info.sport}</div>
        </div>
        <div class="loc ${info.loc.toLowerCase()}">${info.loc === 'Out' ? '🌳 Outside' : '🏠 Inside'}</div>
      </div>
      <div class="rounds">${roundsHTML(L)}</div>
    </div>`;
  }).join('');

  html += `<div class="leagues">${cols}</div>`;
  $main.innerHTML = html;
}

function roundsHTML(L) {
  let h = '';
  [1, 2].forEach(rd => {
    const r = FIXTURES[L][rd];
    h += `<div class="round"><div class="round-label">Round ${rd}</div>`;
    r.games.forEach(g => h += gameCard(g[0], g[1]));
    h += `
      <div class="ref-line">
        🟡 Referee:
        <span class="ref-chip"><span class="dot" style="background:${TEAM_COLOR[r.ref]}"></span>${r.ref}</span>
      </div></div>`;
  });
  return h;
}

function gameCard(a, b) {
  return `
    <div class="game">
      <div class="side a"><span class="chip" style="--team:${TEAM_COLOR[a]}"></span><span class="nm">${a}</span></div>
      <span class="vs">v</span>
      <div class="side b"><span class="chip" style="--team:${TEAM_COLOR[b]}"></span><span class="nm">${b}</span></div>
    </div>`;
}

function pickLesson(n) { state.lesson = n; render(); }

/* Footer status line — covers both leagues in the current section. */
function renderChampLine() {
  const el = document.getElementById('champLine');
  const parts = [];
  LEAGUES.forEach(league => {
    const data = state.standings[key(state.section, league)];
    if (!data || !data.length) return;
    const allDone = data.every(s => s.played >= 8);
    if (allDone && data[0].points > (data[1] ? data[1].points : 0)) {
      parts.push(`🏆 ${league}: ${data[0].team}`);
    } else if (data[0].points > 0) {
      parts.push(`${league} leader: ${data[0].team}`);
    }
  });
  el.textContent = parts.length ? `${state.section} — ` + parts.join('   ·   ') : '';
}

/* ---------- Boot ---------- */
render();
ensureLoaded();
</script>
</body>
</html>
